<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Amor Eterno ✨🌷</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fff8fa;
            --envelope-color: #ffadb8;
            --envelope-dark: #ff8e9e;
            --letter-bg: #ffffff;
            --text-main: #d6336c;
            --magic-glow: rgba(255, 223, 137, 0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            perspective: 1500px; /* Mayor profundidad para el giro del sobre */
        }

        /* --- LLUVIA DE CORAZONES --- */
        .heart-rain {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .heart {
            position: absolute;
            animation: fall linear forwards;
            filter: drop-shadow(0 0 5px rgba(255, 121, 121, 0.3));
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* --- BOTÓN DE INICIO --- */
        #btn-start {
            position: absolute;
            z-index: 100;
            padding: 22px 60px;
            font-size: 1.5rem;
            font-family: 'Dancing Script', cursive;
            color: white;
            background: linear-gradient(45deg, #ff6b6b, #ff8fa3);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 12px 35px rgba(255, 107, 107, 0.4);
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        #btn-start:hover {
            transform: scale(1.08) translateY(-5px);
            box-shadow: 0 18px 45px rgba(255, 107, 107, 0.6);
        }

        #btn-start.hidden {
            opacity: 0;
            visibility: hidden;
            transform: scale(0.5);
        }

        /* --- SOBRE Y CARTA CON EFECTO MÁGICO --- */
        .envelope-wrapper {
            position: relative;
            width: 380px;
            height: 270px;
            z-index: 10;
            opacity: 0;
            transform: translateY(100px);
            transition: all 1.2s ease;
        }

        .envelope-wrapper.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* El Destello Mágico */
        .magic-flash {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            background: radial-gradient(circle, #fff 0%, var(--magic-glow) 40%, transparent 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 20; /* Por encima de todo durante el destello */
            pointer-events: none;
        }

        .envelope-wrapper.flash .magic-flash {
            animation: flashAnimation 1.2s ease-out forwards;
        }

        @keyframes flashAnimation {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            30% { transform: translate(-50%, -50%) scale(80); opacity: 1; filter: blur(5px); }
            100% { transform: translate(-50%, -50%) scale(120); opacity: 0; filter: blur(15px); }
        }

        .envelope {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: var(--envelope-color);
            border-bottom-left-radius: 18px;
            border-bottom-right-radius: 18px;
            box-shadow: 0 35px 70px rgba(0,0,0,0.15);
            transition: transform 0.8s ease;
        }

        /* Tapa del sobre */
        .envelope::before {
            content: '';
            position: absolute;
            top: 0;
            z-index: 4;
            border-left: 190px solid transparent;
            border-right: 190px solid transparent;
            border-top: 150px solid var(--envelope-color);
            transform-origin: top;
            transition: transform 0.8s ease 0.5s;
            filter: drop-shadow(0 3px 3px rgba(0,0,0,0.08));
        }

        .envelope.open::before {
            transform: rotateX(180deg);
            z-index: 1;
        }

        /* Laterales */
        .envelope::after {
            content: '';
            position: absolute;
            bottom: 0;
            z-index: 3;
            border-left: 190px solid var(--envelope-dark);
            border-right: 190px solid var(--envelope-dark);
            border-top: 135px solid transparent;
            border-bottom-left-radius: 18px;
            border-bottom-right-radius: 18px;
        }

        .letter {
            position: absolute;
            bottom: 15px;
            left: 30px;
            width: 320px;
            height: 220px;
            background: var(--letter-bg);
            border-radius: 12px;
            padding: 35px;
            text-align: center;
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1) 1.1s; /* Empieza justo después del destello */
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border: 1px solid #fcfcfc;
        }

        .envelope.open .letter {
            transform: translateY(-200px);
            height: 310px;
            z-index: 5;
            box-shadow: 0 15px 45px rgba(0,0,0,0.1);
        }

        .letter h2 {
            font-family: 'Quicksand', sans-serif;
            color: var(--text-main);
            font-size: 1.7rem;
            font-weight: 700;
            margin-bottom: 25px;
            letter-spacing: -0.5px;
        }

        .letter p {
            color: #4b5563;
            line-height: 1.7;
            font-size: 1.1rem;
            font-style: italic;
            font-weight: 300;
        }

        /* --- JARDÍN DE TULIPANES --- */
        .garden {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;
        }

        .tulip {
            position: absolute;
            bottom: -60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: grow 2.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards,
                       fadeOut 1.5s ease forwards 9s; /* Duran un poco más */
        }

        @keyframes grow {
            0% { transform: translateY(120px) scale(0); }
            100% { transform: translateY(0) scale(1); }
        }

        @keyframes fadeOut {
            to { opacity: 0; transform: scale(0.8) translateY(30px); }
        }

        /* Estética de la Flor Mejorada */
        .flower {
            position: relative;
            width: 48px;
            height: 58px;
            animation: sway 4s ease-in-out infinite alternate;
            transform-origin: bottom center;
        }

        .petal {
            position: absolute;
            width: 32px;
            height: 58px;
            border-radius: 55% 55% 25% 25%;
        }

        .petal-1 { left: 0; transform: rotate(-15deg); filter: brightness(0.9); }
        .petal-2 { right: 0; transform: rotate(15deg); filter: brightness(0.9); }
        /* Pétalo central con más volumen y luz */
        .petal-3 { 
            left: 8px; 
            height: 53px; 
            top: 5px; 
            z-index: 2; 
            box-shadow: inset 0 0 20px rgba(255,255,255,0.6), inset 0 0 5px rgba(0,0,0,0.05); 
        }

        .stem {
            width: 7px;
            height: 180px;
            background: linear-gradient(to bottom, #5ac493, #2d6a4f);
            border-radius: 6px;
        }

        .leaf {
            position: absolute;
            width: 28px;
            height: 65px;
            background: #40916c;
            border-radius: 0 65px;
            left: -25px;
            bottom: 60px;
            transform: rotate(-35deg);
        }

        .leaf-2 {
            left: auto;
            right: -25px;
            border-radius: 65px 0;
            transform: rotate(35deg);
            bottom: 95px;
        }

        /* Colores Tulipanes */
        .t-red .petal { background: #ff5c7c; }
        .t-purple .petal { background: #be9eff; }
        .t-yellow .petal { background: #ffeb3b; }
        .t-pink .petal { background: #ff9fb3; }
        .t-orange .petal { background: #ffa726; }

        @keyframes sway {
            from { transform: rotate(-3deg); }
            to { transform: rotate(3deg); }
        }

        /* Frases Flotantes Poéticas */
        .love-tag {
            position: absolute;
            color: var(--text-main);
            font-weight: 500;
            font-size: 0.9rem;
            animation: floatTag 5s ease-out forwards;
            white-space: nowrap;
            background: rgba(255, 255, 255, 0.7);
            padding: 4px 10px;
            border-radius: 12px;
            backdrop-filter: blur(2px);
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }

        @keyframes floatTag {
            0% { opacity: 0; transform: translateY(0); }
            20% { opacity: 0.9; }
            100% { opacity: 0; transform: translateY(-90px); }
        }
    </style>
</head>
<body>

    <div class="heart-rain" id="heart-rain"></div>

    <button id="btn-start" onclick="openMagic()">Mira la magia que te espera ✨</button>

    <div class="envelope-wrapper" id="wrapper">
        <div class="magic-flash"></div> <div class="envelope" id="envelope">
            <div class="letter">
                <h2>Mi Amor Eterno ❤️</h2>
                <p>Al igual que este jardín que no para de crecer, mi amor por ti es infinito, suave y cada día más bonito. Eres mi todo.</p>
            </div>
        </div>
    </div>

    <div class="garden" id="garden"></div>

    <script>
        // LISTA DE FRASES MÁS BONITAS Y POÉTICAS
        const phrases = [
            "Eres mi caos perfecto", 
            "Contigo el mundo es mejor", 
            "Mi nido de paz ✨", 
            "Adoro tu alma", 
            "Tu risa es mi canción", 
            "Eres mi 'siempre'", 
            "Mi refugio seguro ❤️", 
            "Llenas mi vida de color",
            "Mi sueño cumplido",
            "Contigo no falta nada",
            "Mi amor bonito",
            "Eres pura magia"
        ];
        
        const colors = ["t-red", "t-purple", "t-yellow", "t-pink", "t-orange"];

        function openMagic() {
            document.getElementById('btn-start').classList.add('hidden');
            
            // Mostrar sobre
            const wrapper = document.getElementById('wrapper');
            wrapper.classList.add('show');
            
            // Iniciar corazones
            startHearts();

            // Tiempo exacto para el destello y la apertura
            setTimeout(() => {
                // Activar destello y abrir simultáneamente
                wrapper.classList.add('flash');
                document.getElementById('envelope').classList.add('open');
                
                // Empezar a plantar tulipanes un poco después del destello
                setTimeout(infiniteGarden, 2000);
            }, 1200); // Tiempo para que el sobre suba
        }

        function startHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.fontSize = (Math.random() * 15 + 10) + 'px';
                heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
                document.getElementById('heart-rain').appendChild(heart);
                setTimeout(() => heart.remove(), 7000);
            }, 400);
        }

        function infiniteGarden() {
            createTulip();
            setInterval(createTulip, 1700); // Un poco más rápido para llenar
        }

        function createTulip() {
            const garden = document.getElementById('garden');
            const tulip = document.createElement('div');
            const color = colors[Math.floor(Math.random() * colors.length)];
            const xPos = Math.random() * 92 + 4; // Un poco más de margen
            const scale = Math.random() * 0.35 + 0.8; // Variedad de tamaño

            tulip.className = `tulip ${color}`;
            tulip.style.left = xPos + 'vw';
            tulip.style.transform = `scale(${scale})`;

            tulip.innerHTML = `
                <div class="flower">
                    <div class="petal petal-1"></div>
                    <div class="petal petal-2"></div>
                    <div class="petal petal-3"></div>
                </div>
                <div class="stem">
                    <div class="leaf"></div>
                    <div class="leaf leaf-2"></div>
                </div>
            `;

            garden.appendChild(tulip);
            
            // Soltar frase aleatoria poética
            if(Math.random() > 0.45) { // Un poco más frecuente
                const tag = document.createElement('div');
                tag.className = 'love-tag';
                tag.innerText = phrases[Math.floor(Math.random() * phrases.length)];
                
                // Centrar tag sobre la flor
                tag.style.left = `calc(${xPos}vw - 20px)`; 
                tag.style.bottom = '260px'; // Altura sobre los tallos largos

                document.body.appendChild(tag);
                setTimeout(() => tag.remove(), 5000);
            }

            // Limpieza del tulipán
            setTimeout(() => tulip.remove(), 11000);
        }
    </script>
</body>
</html>
